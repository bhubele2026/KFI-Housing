kind = "web"
previewPath = "/"
title = "HousingOps"
version = "1.0.0"
id = "artifacts/housingops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23456

[services.development]
run = "pnpm --filter @workspace/housingops run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/housingops", "run", "build" ]
publicDir = "artifacts/housingops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23456"
BASE_PATH = "/"
