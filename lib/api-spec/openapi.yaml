          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Room" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
  /rooms/{id}:
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoomUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      description: Fails with 409 if any beds reference this room.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "409":
          description: Conflict — room still has beds
          content:
            application/json:
              schema:
