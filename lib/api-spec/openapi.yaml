openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer records
  - name: properties
    description: Property records
  - name: leases
    description: Lease records
  - name: beds
    description: Bed records
  - name: occupants
    description: Occupant records
  - name: utilities
    description: Utility records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /config:
    get:
      operationId: getRuntimeConfig
      tags: [health]
      summary: Read non-secret runtime config the web app needs at boot
      description: |
        Returns the small set of runtime values the housingops web app needs
        but cannot bake into its bundle — currently just the Google Maps
        Embed API key. The key is exposed deliberately so it can be rotated
        on the server without restarting / rebuilding the web workflow.

        This endpoint must NEVER leak any other secret. Add new fields here
        only when they are already safe to ship to the browser.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeConfig" }

  /reset:
    post:
      operationId: resetToSampleData
      tags: [health]
      summary: Wipe all data and re-seed with sample data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /import:
    post:
      operationId: importData
      tags: [health]
      summary: Wipe all data and replace with the supplied dataset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Customer" }
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Customer" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
  /customers/{id}:
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      description: Fails with 409 if any properties reference this customer.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "409":
          description: Conflict — customer still has properties
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List all properties
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Property" }
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Property" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }
  /properties/{id}:
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PropertyUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /leases:
    get:
      operationId: listLeases
      tags: [leases]
      summary: List all leases
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Lease" }
    post:
      operationId: createLease
      tags: [leases]
      summary: Create a lease
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Lease" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lease" }
  /leases/import-pdf:
    post:
      operationId: importLeasePdf
      tags: [leases]
      summary: Extract lease fields from a single uploaded lease PDF
      description: |
        Accepts a single text-based lease PDF (max 10 MB), extracts the lease
        fields with an LLM, and returns the extracted data plus the best
        matching property in the user's portfolio (if any) along with up to
        five candidates ranked by score.

        The PDF itself is **not** persisted — only the extracted fields are
        returned. Image-only / scanned PDFs are not supported.

        NOTE: The frontend invokes this endpoint via a hand-written
        `fetch(FormData)` client (`artifacts/housingops/src/lib/lease-pdf-import.ts`),
        not via the orval-generated react-query hook, because orval's
        multipart `File` typing requires a DOM lib that the shared
        `api-zod` package doesn't depend on.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: A single lease PDF (`application/pdf`, max 10 MB).
      responses:
        "200":
          description: Lease fields extracted and matched against the portfolio.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeasePdfImportResult" }
        "400":
          description: No file provided in the request.
        "413":
          description: The uploaded PDF is larger than 10 MB.
        "415":
          description: The uploaded file is not `application/pdf`.
        "422":
          description: The PDF could not be parsed (e.g. scanned / image-only) or extraction failed.

  /leases/{id}:
    patch:
      operationId: updateLease
      tags: [leases]
      summary: Update a lease
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeaseUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lease" }
    delete:
      operationId: deleteLease
      tags: [leases]
      summary: Delete a lease
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List all rooms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Room" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
  /rooms/{id}:
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoomUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      description: Fails with 409 if any beds reference this room.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "409":
          description: Conflict — room still has beds
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  /beds:
    get:
      operationId: listBeds
      tags: [beds]
      summary: List all beds
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Bed" }
    post:
      operationId: createBed
      tags: [beds]
      summary: Create a bed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Bed" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Bed" }
  /beds/{id}:
    patch:
      operationId: updateBed
      tags: [beds]
      summary: Update a bed
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BedUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Bed" }
    delete:
      operationId: deleteBed
      tags: [beds]
      summary: Delete a bed
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /occupants:
    get:
      operationId: listOccupants
      tags: [occupants]
      summary: List all occupants
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Occupant" }
    post:
      operationId: createOccupant
      tags: [occupants]
      summary: Create an occupant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Occupant" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Occupant" }
  /occupants/{id}:
    patch:
      operationId: updateOccupant
      tags: [occupants]
      summary: Update an occupant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OccupantUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Occupant" }

  /utilities:
    get:
      operationId: listUtilities
      tags: [utilities]
      summary: List all utilities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Utility" }
    post:
      operationId: createUtility
      tags: [utilities]
      summary: Create a utility
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Utility" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Utility" }
  /utilities/{id}:
    patch:
      operationId: updateUtility
      tags: [utilities]
      summary: Update a utility
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UtilityUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Utility" }
    delete:
      operationId: deleteUtility
      tags: [utilities]
      summary: Delete a utility
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    RuntimeConfig:
      type: object
      required: [googleMapsApiKey, googleMapsMapId]
      description: |
        Runtime config the web app fetches once on mount. The Google Maps
        Embed API key is intentionally exposed (the embed URL puts it on
        the wire anyway) but no other secret may be added here.
      properties:
        googleMapsApiKey:
          type: ["string", "null"]
          description: |
            Google Maps Embed API key, or `null` when the operator hasn't
            configured one yet. The web app uses `null` to render its
            graceful "Open in Google Maps" fallback instead of an embed.
        googleMapsMapId:
          type: ["string", "null"]
          description: |
            Google Cloud Map ID for the portfolio map's branded vector
            style (custom palette + reduced POI clutter), or `null` when
            the operator hasn't configured one yet. AdvancedMarkerElement
            requires a Map ID to render at all, so when this is `null`
            the portfolio map falls back to Google's built-in
            `DEMO_MAP_ID` so a fresh workspace still renders pins.

    Customer:
      type: object
      required: [id, name, contactName, email, phone, notes]
      properties:
        id: { type: string }
        name: { type: string }
        contactName: { type: string }
        email: { type: string }
        phone: { type: string }
        notes: { type: string }
    CustomerUpdate:
      type: object
      properties:
        name: { type: string }
        contactName: { type: string }
        email: { type: string }
        phone: { type: string }
        notes: { type: string }

    Property:
      type: object
      required:
        - id
        - name
        - address
        - city
        - state
        - zip
        - totalBeds
        - monthlyRent
        - chargePerBed
        - status
        - landlordName
        - landlordEmail
        - landlordPhone
        - paymentMethod
        - paymentRecipient
        - paymentDueDay
        - paymentNotes
        - bankName
        - bankRouting
        - bankAccount
        - portalUrl
        - notes
        - furnishings
        - customerId
      properties:
        id: { type: string }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        zip: { type: string }
        totalBeds: { type: integer }
        monthlyRent: { type: number }
        chargePerBed: { type: number }
        status: { type: string, enum: [Active, Inactive] }
        landlordName: { type: string }
        landlordEmail: { type: string }
        landlordPhone: { type: string }
        paymentMethod:
          type: string
          enum: [ACH, Check, Wire, Online Portal, Money Order]
        paymentRecipient: { type: string }
        paymentDueDay: { type: integer }
        rentFrequency:
          type: string
          enum: [Weekly, Bi-Weekly, Monthly]
        paymentNotes: { type: string }
        bankName: { type: string }
        bankRouting: { type: string }
        bankAccount: { type: string }
        portalUrl: { type: string }
        notes: { type: string }
        furnishings:
          type: array
          items: { type: string }
        customerId: { type: string }
        ratings:
          $ref: "#/components/schemas/Ratings"
        lat:
          type: number
          nullable: true
          description: |
            Cached geographic latitude resolved from the property's
            address. Persisted on the server so the portfolio map can
            render pins instantly without re-geocoding on every load.
            Cleared when the address changes so it gets re-geocoded.
        lng:
          type: number
          nullable: true
          description: |
            Cached geographic longitude resolved from the property's
            address. See `lat` for caching semantics.
        coordsVerified:
          type: boolean
          description: |
            Whether the operator has confirmed the persisted lat/lng
            pinpoints the property accurately. Auto-geocoded pins land
            here as `false` so the UI can label them "approximate".
            Cleared back to `false` automatically when the address
            changes — a verified pin only applies to the address it
            was verified against.
    PropertyUpdate:
      type: object
      properties:
        name: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        zip: { type: string }
        totalBeds: { type: integer }
        monthlyRent: { type: number }
        chargePerBed: { type: number }
        status: { type: string, enum: [Active, Inactive] }
        landlordName: { type: string }
        landlordEmail: { type: string }
        landlordPhone: { type: string }
        paymentMethod:
          type: string
          enum: [ACH, Check, Wire, Online Portal, Money Order]
        paymentRecipient: { type: string }
        paymentDueDay: { type: integer }
        rentFrequency:
          type: string
          enum: [Weekly, Bi-Weekly, Monthly]
        paymentNotes: { type: string }
        bankName: { type: string }
        bankRouting: { type: string }
        bankAccount: { type: string }
        portalUrl: { type: string }
        notes: { type: string }
        furnishings:
          type: array
          items: { type: string }
        customerId: { type: string }
        ratings:
          $ref: "#/components/schemas/Ratings"
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        coordsVerified:
          type: boolean
          description: |
            Whether the operator has confirmed the persisted lat/lng
            pinpoints the property accurately. See `Property.coordsVerified`
            for the full contract.

    Ratings:
      type: object
      description: |
        Per-property subjective ratings on a 0–5 whole-star scale.
        A category value of 0 means "not rated yet" and is excluded
        from the overall average shown in the UI.
      required: [landlord, cleanliness, amenities, occupants, location, valueForMoney]
      properties:
        landlord:      { type: integer, minimum: 0, maximum: 5 }
        cleanliness:   { type: integer, minimum: 0, maximum: 5 }
        amenities:     { type: integer, minimum: 0, maximum: 5 }
        occupants:     { type: integer, minimum: 0, maximum: 5 }
        location:      { type: integer, minimum: 0, maximum: 5 }
        valueForMoney: { type: integer, minimum: 0, maximum: 5 }

    # Plain calendar date stored as `YYYY-MM-DD`. We deliberately do NOT use
    # OpenAPI's `format: date` here because that maps to `z.date()` (via
    # orval's `useDates: true`), which would coerce values to JS Date objects
    # at the API boundary. The downstream renewal calculator on the frontend
    # splits the raw string on `-` to compute renewal windows, so we keep
    # these as strings and enforce the canonical shape with a regex. This
    # rejects values like `"2026-05-31 00:00:00"` or
    # `"2026-05-31T00:00:00.000Z"` at the API boundary so they cannot reach
    # the database.
    LeaseDate:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2}$'
      example: "2026-05-31"
    Lease:
      type: object
      # The extended fields (clauses, buyoutAvailable, buyoutCost) are
      # intentionally NOT required so older import payloads and pre-extension
      # API clients keep parsing. They are always present in fresh API
      # responses (the DB columns have defaults) but consumers that round-trip
      # them must tolerate their absence on the way IN.
      required: [id, propertyId, startDate, endDate, monthlyRent, securityDeposit, status, notes]
      properties:
        id: { type: string }
        propertyId: { type: string }
        startDate: { $ref: "#/components/schemas/LeaseDate" }
        endDate: { $ref: "#/components/schemas/LeaseDate" }
        monthlyRent: { type: number }
        securityDeposit: { type: number }
        status: { type: string, enum: [Active, Expired, Upcoming] }
        notes: { type: string }
        clauses:
          type: string
          description: "Free-form clause text (additional terms / addenda)."
        buyoutAvailable:
          type: boolean
          description: "Whether the lease has a buyout option."
        buyoutCost:
          type: ["number", "null"]
          description: "Cost of the buyout option, or null when unknown / N/A."
    LeaseUpdate:
      type: object
      properties:
        propertyId: { type: string }
        startDate: { $ref: "#/components/schemas/LeaseDate" }
        endDate: { $ref: "#/components/schemas/LeaseDate" }
        monthlyRent: { type: number }
        securityDeposit: { type: number }
        status: { type: string, enum: [Active, Expired, Upcoming] }
        notes: { type: string }
        clauses: { type: string }
        buyoutAvailable: { type: boolean }
        buyoutCost:
          type: ["number", "null"]

    Room:
      type: object
      required: [id, propertyId, name, sqft, bathrooms, monthlyRent]
      properties:
        id: { type: string }
        propertyId: { type: string }
        name: { type: string }
        sqft: { type: integer }
        bathrooms: { type: number }
        monthlyRent: { type: number }
    RoomUpdate:
      type: object
      properties:
        propertyId: { type: string }
        name: { type: string }
        sqft: { type: integer }
        bathrooms: { type: number }
        monthlyRent: { type: number }

    Bed:
      type: object
      required: [id, propertyId, bedNumber, roomId, status, occupantId]
      properties:
        id: { type: string }
        propertyId: { type: string }
        bedNumber: { type: integer }
        roomId: { type: string }
        status: { type: string, enum: [Occupied, Vacant] }
        occupantId:
          type: ["string", "null"]
    BedUpdate:
      type: object
      properties:
        propertyId: { type: string }
        bedNumber: { type: integer }
        roomId: { type: string }
        status: { type: string, enum: [Occupied, Vacant] }
        occupantId:
          type: ["string", "null"]

    Occupant:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - bedId
        - propertyId
        - moveInDate
        - moveOutDate
        - status
        - chargePerBed
        - billingFrequency
        - employeeId
        - company
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        bedId:
          type: ["string", "null"]
        propertyId:
          type: ["string", "null"]
        moveInDate: { $ref: "#/components/schemas/LeaseDate" }
        moveOutDate:
          oneOf:
            - $ref: "#/components/schemas/LeaseDate"
            - type: "null"
        status: { type: string, enum: [Active, Former] }
        chargePerBed: { type: number }
        billingFrequency: { type: string, enum: [Weekly, Biweekly, Monthly] }
        employeeId: { type: string }
        company: { type: string }
    OccupantUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        bedId:
          type: ["string", "null"]
        propertyId:
          type: ["string", "null"]
        moveInDate: { $ref: "#/components/schemas/LeaseDate" }
        moveOutDate:
          oneOf:
            - $ref: "#/components/schemas/LeaseDate"
            - type: "null"
        status: { type: string, enum: [Active, Former] }
        chargePerBed: { type: number }
        billingFrequency: { type: string, enum: [Weekly, Biweekly, Monthly] }
        employeeId: { type: string }
        company: { type: string }

    Utility:
      type: object
      required: [id, propertyId, type, company, monthlyCost, accountNumber, notes]
      properties:
        id: { type: string }
        propertyId: { type: string }
        type:
          type: string
          enum: [Electric, Gas, Propane, Water, Garbage, Internet, Other]
        company: { type: string }
        monthlyCost: { type: number }
        accountNumber: { type: string }
        notes: { type: string }
    UtilityUpdate:
      type: object
      properties:
        propertyId: { type: string }
        type:
          type: string
          enum: [Electric, Gas, Propane, Water, Garbage, Internet, Other]
        company: { type: string }
        monthlyCost: { type: number }
        accountNumber: { type: string }
        notes: { type: string }

    LeasePdfExtracted:
      type: object
      required:
        - propertyName
        - propertyAddress
        - city
        - state
        - zip
        - landlordName
        - startDate
        - endDate
        - monthlyRent
        - securityDeposit
        - notes
        - clauses
        - buyoutAvailable
        - buyoutCost
        - confidence
      description: |
        Lease fields parsed from the uploaded PDF. Any field the LLM could not
        identify with reasonable certainty is returned as `null` (or `""` /
        `false` for the non-nullable string / boolean fields) so the user can
        fill it in during the review step.
      properties:
        propertyName: { type: string, nullable: true }
        propertyAddress: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        zip: { type: string, nullable: true }
        landlordName: { type: string, nullable: true }
        startDate: { type: string, nullable: true, description: "ISO 8601 date" }
        endDate: { type: string, nullable: true, description: "ISO 8601 date" }
        monthlyRent: { type: number, nullable: true }
        securityDeposit: { type: number, nullable: true }
        notes: { type: string }
        clauses:
          type: string
          description: Free-form summary of notable lease clauses (pet policy, late fees, etc.). Empty when none.
        buyoutAvailable:
          type: boolean
          description: True only when the lease explicitly grants an early-termination buyout option.
        buyoutCost:
          type: number
          nullable: true
          description: Flat USD buyout fee when stated, else null. Always null when `buyoutAvailable` is false.
        confidence:
          type: string
          enum: [high, medium, low]

    LeasePdfPropertyCandidate:
      type: object
      required: [propertyId, propertyName, address, city, state, customerName, score]
      properties:
        propertyId: { type: string }
        propertyName: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        customerName: { type: string }
        score:
          type: number
          description: 0..1 match score, higher is better.

    LeasePdfImportResult:
      type: object
      required: [extracted, topMatch, candidates]
      properties:
        extracted: { $ref: "#/components/schemas/LeasePdfExtracted" }
        topMatch:
          allOf: [{ $ref: "#/components/schemas/LeasePdfPropertyCandidate" }]
          nullable: true
          description: Best candidate when its score is comfortably above the noise floor; otherwise `null`.
        candidates:
          type: array
          maxItems: 5
          description: Top candidates sorted by score desc; may be empty.
          items: { $ref: "#/components/schemas/LeasePdfPropertyCandidate" }

    ImportPayload:
      type: object
      required: [customers, properties, leases, rooms, beds, occupants, utilities]
      properties:
        customers:
          type: array
          items: { $ref: "#/components/schemas/Customer" }
        properties:
          type: array
          items: { $ref: "#/components/schemas/Property" }
        leases:
          type: array
          items: { $ref: "#/components/schemas/Lease" }
        rooms:
          type: array
          items: { $ref: "#/components/schemas/Room" }
        beds:
          type: array
          items: { $ref: "#/components/schemas/Bed" }
        occupants:
          type: array
          items: { $ref: "#/components/schemas/Occupant" }
        utilities:
          type: array
          items: { $ref: "#/components/schemas/Utility" }
