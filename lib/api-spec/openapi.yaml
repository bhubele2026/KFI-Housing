openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer records
  - name: properties
    description: Property records
  - name: leases
    description: Lease records
  - name: beds
    description: Bed records
  - name: occupants
    description: Occupant records
  - name: utilities
    description: Utility records
  - name: payroll
    description: Payroll-derived housing deductions
  - name: insurance
    description: Renter's / liability insurance certificates on file
  - name: violations
    description: Per-property rule violations logged against an occupant
  - name: digest
    description: Weekly lease-expiry digest configuration
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /config:
    get:
      operationId: getRuntimeConfig
      tags: [health]
      summary: Read non-secret runtime config the web app needs at boot
      description: |
        Returns the small set of runtime values the housingops web app needs
        but cannot bake into its bundle — currently just the Google Maps
        Embed API key. The key is exposed deliberately so it can be rotated
        on the server without restarting / rebuilding the web workflow.

        This endpoint must NEVER leak any other secret. Add new fields here
        only when they are already safe to ship to the browser.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeConfig" }

  /reset:
    post:
      operationId: resetToSampleData
      tags: [health]
      summary: Wipe all data and re-seed with sample data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /import:
    post:
      operationId: importData
      tags: [health]
      summary: Wipe all data and replace with the supplied dataset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Customer" }
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Customer" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
  /customers/{id}:
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      description: Fails with 409 if any properties reference this customer.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "409":
          description: Conflict — customer still has properties
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List all properties
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Property" }
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Property" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }
  /properties/backfill-coords:
    post:
      operationId: backfillPropertyCoords
      tags: [properties]
      summary: Backfill missing map pin coordinates
      description: |
        One-shot admin endpoint that walks every property and geocodes
        any whose `lat`/`lng` is null but whose composed address is
        non-blank, persisting the result with `coordsVerified=false`.

        Idempotent — rows that already have coordinates, blank-address
        rows, and rows the geocoder can't resolve are all skipped, so
        re-running after fixing a typo'd address only touches the rows
        that just became resolvable.
      responses:
        "200":
          description: Backfill summary
          content:
            application/json:
              schema:
                type: object
                required:
                  - scanned
                  - updated
                  - alreadyHadCoords
                  - noAddress
                  - stillMissing
                properties:
                  scanned:
                    type: integer
                    description: Total rows examined.
                  updated:
                    type: integer
                    description: Rows whose null coords got resolved this run.
                  alreadyHadCoords:
                    type: integer
                    description: Rows skipped because lat/lng were already set.
                  noAddress:
                    type: integer
                    description: Rows skipped because every address field was blank.
                  stillMissing:
                    type: integer
                    description: |
                      Rows with an address that the geocoder couldn't
                      resolve. They stay null so a future run after the
                      address is corrected can pick them up.
  /properties/{id}:
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PropertyUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /leases:
    get:
      operationId: listLeases
      tags: [leases]
      summary: List all leases
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Lease" }
    post:
      operationId: createLease
      tags: [leases]
      summary: Create a lease
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Lease" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lease" }
  /leases/import-pdf:
    post:
      operationId: importLeasePdf
      tags: [leases]
      summary: Extract lease fields from a single uploaded lease PDF
      description: |
        Accepts a single text-based lease PDF (max 10 MB), extracts the lease
        fields with an LLM, and returns the extracted data plus the best
        matching property in the user's portfolio (if any) along with up to
        five candidates ranked by score.

        The PDF itself is **not** persisted — only the extracted fields are
        returned. Image-only / scanned PDFs are not supported.

        NOTE: The frontend invokes this endpoint via a hand-written
        `fetch(FormData)` client (`artifacts/housingops/src/lib/lease-pdf-import.ts`),
        not via the orval-generated react-query hook, because orval's
        multipart `File` typing requires a DOM lib that the shared
        `api-zod` package doesn't depend on.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: A single lease PDF (`application/pdf`, max 10 MB).
      responses:
        "200":
          description: Lease fields extracted and matched against the portfolio.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeasePdfImportResult" }
        "400":
          description: No file provided in the request.
        "413":
          description: The uploaded PDF is larger than 10 MB.
        "415":
          description: The uploaded file is not `application/pdf`.
        "422":
          description: The PDF could not be parsed (e.g. scanned / image-only) or extraction failed.

  /leases/import-master/last-auto-import:
    get:
      operationId: getLastAutoMasterImport
      tags: [leases]
      summary: Most recent successful boot-time master-file auto-import
      description: |
        Returns the timestamp + summary counts of the most recent
        successful boot-time auto-import of the bundled master housing
        spreadsheet (Task #318). The Leases page renders this next to
        the manual "Import master file" button so operators can confirm
        the boot import ran and spot the case where it silently failed.

        When the boot import has never succeeded in this api-server
        process (fresh deploy that errored on its first attempt), the
        response is `{"ranAt": null}` and all count fields are omitted.

        `bundledMtime` carries the modification time of the bundled
        `Housing_Lease_MASTER_*.xlsx` file under `attached_assets/`
        (Task #340) so the UI can flip its badge to a warning style
        when the recorded `ranAt` is older than the bundled workbook
        — that's the silent-failure case where someone dropped a fresh
        master file but the api-server hasn't been restarted to pick
        it up. `null` when the bundled file is unreadable on disk.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LastAutoMasterImport" }

  /leases/import-master:
    post:
      operationId: importMasterLeases
      tags: [leases]
      summary: Import the Housing_Lease_MASTER spreadsheet (idempotent)
      description: |
        Idempotent admin import of the master housing lease spreadsheet
        (task #288). Accepts an optional uploaded `.xlsx` file; when no
        file is provided, the bundled `attached_assets/Housing_Lease_MASTER_*.xlsx`
        is used. Customers are matched by normalized name (Levenshtein ≤2 fuzzy
        fallback), properties by normalized address + zip, and leases by
        property + unit-number marker in the lease notes — so re-runs never
        produce duplicates and never overwrite operator edits to landlord /
        payment data.

        Rows whose source cells are ambiguous ("TBD", "n/a", "$69.23???",
        descriptive prose) are still imported but flagged with
        `lease.needsReview = true` so an operator can triage them later.
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Optional `.xlsx` workbook in the master-file shape.
                    When omitted, the importer reads the bundled
                    `attached_assets/Housing_Lease_MASTER_1778105244042.xlsx`.
      responses:
        "200":
          description: Import complete; returns a structured per-row summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MasterLeaseImportResult" }
        "413":
          description: The uploaded workbook is larger than 5 MB.
        "415":
          description: The uploaded file is not an `.xlsx` workbook.
        "500":
          description: Importer failed (transaction rolled back).

  /room-night-logs:
    get:
      operationId: listRoomNightLogs
      tags: [leases]
      summary: List all room-night logs
      description: |
        Returns every room-night log entry across all hotel-rate leases.
        Logs record the actual room-nights consumed in a given calendar
        month against a lease whose `rateType` is `room-night`. Added
        by task #299.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RoomNightLog" }
    post:
      operationId: createRoomNightLog
      tags: [leases]
      summary: Create a room-night log entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoomNightLog" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoomNightLog" }
  /room-night-logs/{id}:
    patch:
      operationId: updateRoomNightLog
      tags: [leases]
      summary: Update a room-night log entry
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoomNightLogUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoomNightLog" }
    delete:
      operationId: deleteRoomNightLog
      tags: [leases]
      summary: Delete a room-night log entry
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
  /leases/{id}:
    patch:
      operationId: updateLease
      tags: [leases]
      summary: Update a lease
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeaseUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lease" }
    delete:
      operationId: deleteLease
      tags: [leases]
      summary: Delete a lease
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /digest-recipients:
    get:
      operationId: listDigestRecipients
      tags: [digest]
      summary: List all weekly lease digest recipients
      description: |
        Returns every email address currently subscribed to the weekly
        lease-expiry digest. Admins manage this list in-app so changes
        take effect on the next scheduler tick without a redeploy.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DigestRecipient" }
    post:
      operationId: createDigestRecipient
      tags: [digest]
      summary: Add a recipient to the weekly lease digest
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DigestRecipientCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DigestRecipient" }
        "409":
          description: Email already subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
  /digest-recipients/{id}:
    delete:
      operationId: deleteDigestRecipient
      tags: [digest]
      summary: Remove a recipient from the weekly lease digest
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /insurance-certificates:
    get:
      operationId: listInsuranceCertificates
      tags: [insurance]
      summary: List all insurance certificates on file
      description: |
        Returns every renter's / liability insurance certificate currently
        on file across all properties. Certificates are the manual-entry
        intake path described in `lib/db/src/schema/insurance-certificates.ts`:
        operators receive ACORD 25 certs by email and POST one row per cert
        here (or rely on a PDF seeder when the source PDF is attached to
        the project — see Task #334).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InsuranceCertificate" }
    post:
      operationId: createInsuranceCertificate
      tags: [insurance]
      summary: Capture a new insurance certificate from a PDF / email
      description: |
        Manual intake form for an insurance certificate (ACORD 25 or
        equivalent). At minimum supply `id` + `propertyId`; every other
        field defaults to an empty string in the schema so partial
        certs (e.g. "we know it exists, carrier TBD") can still be
        captured. The optional `documentUrl` field accepts the source
        PDF filename today (and a real object-storage URL later).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InsuranceCertificate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsuranceCertificate" }
  /insurance-certificates/{id}:
    patch:
      operationId: updateInsuranceCertificate
      tags: [insurance]
      summary: Update an insurance certificate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InsuranceCertificateUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsuranceCertificate" }
    delete:
      operationId: deleteInsuranceCertificate
      tags: [insurance]
      summary: Delete an insurance certificate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /properties/{id}/violations:
    get:
      operationId: listPropertyViolations
      tags: [violations]
      summary: List rule violations logged against a property
      description: |
        Returns every violation row recorded for the given property, in
        reverse chronological order (most recent `occurredOn` first).
        Rows are tied to a specific occupant when known, but
        `occupantId` may be empty if the offender has since moved out
        — the snapshot in `occupantName` keeps the row readable.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PropertyViolation" }
    post:
      operationId: createPropertyViolation
      tags: [violations]
      summary: Log a new rule violation against a property
      description: |
        Records a new violation entry for the given property. The
        client supplies the occupant id (or empty when the offender
        has moved out), the canonical category, the date the
        violation occurred, and the pasted notification body. The
        server fills in `createdAt` automatically.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PropertyViolationCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PropertyViolation" }
  /properties/{id}/projected-move-ins:
    get:
      operationId: listProjectedMoveIns
      tags: [projected-move-ins]
      summary: List projected (planned) move-ins for a property
      description: |
        Returns every active (not-yet-converted) projected move-in
        recorded for the given property, sorted by
        `projectedMoveInDate` ascending so the next upcoming
        arrival is at the top. Once a projection has been
        converted into a real occupant via the convert endpoint,
        it is hidden from this list.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectedMoveIn" }
    post:
      operationId: createProjectedMoveIn
      tags: [projected-move-ins]
      summary: Add a projected move-in for a property
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectedMoveInCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectedMoveIn" }
  /properties/{id}/projected-move-ins/{moveInId}:
    patch:
      operationId: updateProjectedMoveIn
      tags: [projected-move-ins]
      summary: Edit a projected move-in
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: moveInId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectedMoveInUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectedMoveIn" }
    delete:
      operationId: deleteProjectedMoveIn
      tags: [projected-move-ins]
      summary: Delete a projected move-in
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: moveInId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
  /properties/{id}/projected-move-ins/{moveInId}/convert:
    post:
      operationId: convertProjectedMoveIn
      tags: [projected-move-ins]
      summary: Convert a projected move-in into a real occupant
      description: |
        Creates a new `occupants` row tied to the chosen bed (the
        bed stored on the projection, or the optional override in
        the request body), reuses the existing occupant-creation
        validation (move-in date format, bed cleaning status), and
        stamps `convertedOccupantId` on the projection so it stays
        linked. Returns the projection row with the
        `convertedOccupantId` set; the new occupant is exposed
        separately via `occupant` in the same response so the
        client can update its caches without an extra round-trip.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: moveInId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectedMoveInConvert" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [projectedMoveIn, occupant]
                properties:
                  projectedMoveIn: { $ref: "#/components/schemas/ProjectedMoveIn" }
                  occupant: { $ref: "#/components/schemas/Occupant" }

  /properties/{id}/violations/{violationId}:
    delete:
      operationId: deletePropertyViolation
      tags: [violations]
      summary: Delete a property violation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: violationId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List all rooms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Room" }
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Room" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
  /rooms/{id}:
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoomUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      description: Fails with 409 if any beds reference this room.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "409":
          description: Conflict — room still has beds
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  /beds:
    get:
      operationId: listBeds
      tags: [beds]
      summary: List all beds
