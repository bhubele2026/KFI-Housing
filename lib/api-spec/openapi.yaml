  /digest-recipients:
    get:
      operationId: listDigestRecipients
      tags: [digest]
      summary: List all weekly lease digest recipients
      description: |
        Returns every email address currently subscribed to the weekly
        lease-expiry digest. Admins manage this list in-app so changes
        take effect on the next scheduler tick without a redeploy.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DigestRecipient" }
    post:
      operationId: createDigestRecipient
      tags: [digest]
      summary: Add a recipient to the weekly lease digest
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DigestRecipientCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DigestRecipient" }
        "409":
          description: Email already subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
  /digest-recipients/{id}:
    delete:
      operationId: deleteDigestRecipient
      tags: [digest]
      summary: Remove a recipient from the weekly lease digest
      parameters:
        - in: path
          name: id
          required: true
