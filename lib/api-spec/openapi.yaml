      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Utility" }
  /utilities/{id}:
    patch:
      operationId: updateUtility
      tags: [utilities]
      summary: Update a utility
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UtilityUpdate" }
      responses:
        "200":
          description: OK
