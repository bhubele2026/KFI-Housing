          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeaseUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lease" }
    delete:
      operationId: deleteLease
      tags: [leases]
      summary: Delete a lease
      parameters:
        - in: path
          name: id
          required: true
