  /payroll/unplaced:
    get:
      operationId: listUnplacedPayroll
      tags: [payroll]
      summary: List payroll deductions with no matching occupant yet
      description: |
        Re-runs the idempotent payroll → occupant reconciler (the same
        seeder that runs at startup) and returns two lists:

        - `unmatched`: payroll rows that don't match any occupant by
          `(employeeId)`, `(name + company)`, or unique `(name)`. The
          dashboard renders these as "assign to a bed" rows.
        - `lowConfidenceMatches`: payroll rows that DID match — but
          only via the fragile name-only fallback (no employeeId, no
          name+company hit). The seeder already applied the rate to
          the matched occupant, but at the same employer there can be
          two namesakes (two "Jose Garcia"s) so the wrong one may have
          received the rate. The dashboard surfaces these in a
          "Confirm match" section so the operator can either confirm
          the picked occupant (stamping employeeId so future runs
          match strongly) or redirect the rate to a different
          same-employer candidate.

        By default the seeder leaves manually-overridden occupants
        alone (chargeSource === "manual_override"). Pass
        `reclaimOverridden=true` to overwrite those rows with the
        payroll values and flip chargeSource back to "payroll" — use
        sparingly, since this discards the operator's manual edit.
      parameters:
        - in: query
          name: reclaimOverridden
          required: false
          description: |
            When "true", the seeder re-claims occupants whose
            chargeSource is "manual_override", overwriting their
            chargePerBed + billingFrequency with the payroll values.
            Anything else keeps the safe default (skip overrides).
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListUnplacedPayrollResult" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    RuntimeConfig:
      type: object
      required: [googleMapsApiKey, googleMapsMapId]
      description: |
        Runtime config the web app fetches once on mount. The Google Maps
        Embed API key is intentionally exposed (the embed URL puts it on
        the wire anyway) but no other secret may be added here.
      properties:
        googleMapsApiKey:
          type: ["string", "null"]
          description: |
            Google Maps Embed API key, or `null` when the operator hasn't
            configured one yet. The web app uses `null` to render its
            graceful "Open in Google Maps" fallback instead of an embed.
        googleMapsMapId:
          type: ["string", "null"]
          description: |
            Google Cloud Map ID for the portfolio map's branded vector
            style (custom palette + reduced POI clutter), or `null` when
            the operator hasn't configured one yet. AdvancedMarkerElement
            requires a Map ID to render at all, so when this is `null`
            the portfolio map falls back to Google's built-in
            `DEMO_MAP_ID` so a fresh workspace still renders pins.

    Customer:
      type: object
      # `state` is intentionally NOT required so older import payloads
      # (and pre-extension API clients) keep parsing. The DB column has
      # a `""` default, so fresh API responses always include it.
      required: [id, name, contactName, email, phone, notes]
      properties:
        id: { type: string }
        name: { type: string }
        contactName: { type: string }
        email: { type: string }
        phone: { type: string }
        notes: { type: string }
        state:
          type: string
          description: |
            Two-letter US state code used to group customers on the
            Customers page. Empty string when unknown. Populated by
            the Housing_Lease_MASTER importer (task #288).
    CustomerUpdate:
      type: object
      properties:
        name: { type: string }
        contactName: { type: string }
        email: { type: string }
        phone: { type: string }
        notes: { type: string }
        state: { type: string }

    Property:
      type: object
      required:
        - id
        - name
        - address
        - city
        - state
        - zip
        - totalBeds
        - monthlyRent
        - chargePerBed
        - status
        - landlordName
        - landlordEmail
        - landlordPhone
        - paymentMethod
        - paymentRecipient
        - paymentDueDay
        - paymentNotes
        - bankName
        - bankRouting
        - bankAccount
        - portalUrl
        - notes
        - furnishings
        - customerId
      properties:
        id: { type: string }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        zip: { type: string }
        totalBeds: { type: integer }
        monthlyRent: { type: number }
        chargePerBed: { type: number }
        status: { type: string, enum: [Active, Inactive] }
        landlordName: { type: string }
        landlordEmail: { type: string }
        landlordPhone: { type: string }
        # `""` and `"Invoice"` are accepted alongside the canonical
        # five payment methods so legacy / triage rows survive the
        # response parser. Blank means "not yet known"; "Invoice"
        # covers hotel-style corporate-rate agreements (e.g. the
        # Ridge Motor Inn KFI seed) that bill per room-night via an
        # invoice rather than one of the recurring channels. See
        # task #364 — without these, GET /properties 500s on legacy
        # seed rows and the entire Customers page renders blank.
        paymentMethod:
          type: string
          enum: ["", ACH, Check, Wire, Online Portal, Money Order, Invoice]
        paymentRecipient: { type: string }
        paymentDueDay: { type: integer }
        rentFrequency:
          type: string
          enum: [Weekly, Bi-Weekly, Monthly]
        paymentNotes: { type: string }
        bankName: { type: string }
        bankRouting: { type: string }
        bankAccount: { type: string }
        portalUrl: { type: string }
        notes: { type: string }
        furnishings:
          type: array
          items: { type: string }
        customerId: { type: string }
        sharedWithCustomerIds:
          type: array
          items: { type: string }
          description: |
            Additional customers that also use this property. Empty for
            the common single-tenant case; populated when a property is
            shared between multiple customers (e.g. Ridge Motor Inn —
            shared by Penda + Trienda KFI crews, task #295). The
            Properties page surfaces the property under each of these
            customers in addition to the primary `customerId`.
        ratings:
          $ref: "#/components/schemas/Ratings"
        lat:
          type: number
          nullable: true
          description: |
            Cached geographic latitude resolved from the property's
            address. Persisted on the server so the portfolio map can
            render pins instantly without re-geocoding on every load.
            Cleared when the address changes so it gets re-geocoded.
        lng:
          type: number
          nullable: true
          description: |
            Cached geographic longitude resolved from the property's
            address. See `lat` for caching semantics.
        coordsVerified:
          type: boolean
          description: |
            Whether the operator has confirmed the persisted lat/lng
            pinpoints the property accurately. Auto-geocoded pins land
            here as `false` so the UI can label them "approximate".
            Cleared back to `false` automatically when the address
            changes — a verified pin only applies to the address it
            was verified against.
        geocodeStatus:
          type: string
          enum: [ok, no_result, skipped]
          description: |
            Outcome of the server-side geocode the route ran on this
            create/update (Task #228). Transient — set only on the
            POST/PATCH response so the client can surface a save-time
            warning toast when an address couldn't be located. Not
            persisted, never returned by GET /properties.
              - `ok`: geocoder returned coords (or the request supplied
                explicit lat/lng that were honored).
              - `no_result`: a non-blank address was geocoded but
                Google had no result — the property still saved with
                `lat: null, lng: null` so it lands in the missing-
                address side panel.
              - `skipped`: nothing to geocode — either the address was
                wholly blank or the PATCH body didn't touch any
                address field.
    PropertyUpdate:
      type: object
      properties:
        name: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        zip: { type: string }
        totalBeds: { type: integer }
        monthlyRent: { type: number }
        chargePerBed: { type: number }
        status: { type: string, enum: [Active, Inactive] }
        landlordName: { type: string }
        landlordEmail: { type: string }
        landlordPhone: { type: string }
        # `""` and `"Invoice"` are accepted alongside the canonical
        # five payment methods so legacy / triage rows survive the
        # response parser. Blank means "not yet known"; "Invoice"
        # covers hotel-style corporate-rate agreements (e.g. the
        # Ridge Motor Inn KFI seed) that bill per room-night via an
        # invoice rather than one of the recurring channels. See
        # task #364 — without these, GET /properties 500s on legacy
        # seed rows and the entire Customers page renders blank.
        paymentMethod:
          type: string
          enum: ["", ACH, Check, Wire, Online Portal, Money Order, Invoice]
        paymentRecipient: { type: string }
        paymentDueDay: { type: integer }
        rentFrequency:
          type: string
          enum: [Weekly, Bi-Weekly, Monthly]
        paymentNotes: { type: string }
        bankName: { type: string }
        bankRouting: { type: string }
        bankAccount: { type: string }
        portalUrl: { type: string }
        notes: { type: string }
        furnishings:
          type: array
          items: { type: string }
        customerId: { type: string }
        sharedWithCustomerIds:
          type: array
          items: { type: string }
          description: |
            Additional customers that also use this property. See
            `Property.sharedWithCustomerIds` for the full contract.
        ratings:
          $ref: "#/components/schemas/Ratings"
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        coordsVerified:
          type: boolean
          description: |
            Whether the operator has confirmed the persisted lat/lng
            pinpoints the property accurately. See `Property.coordsVerified`
            for the full contract.

    Ratings:
      type: object
      description: |
        Per-property subjective ratings on a 0–5 whole-star scale.
        A category value of 0 means "not rated yet" and is excluded
        from the overall average shown in the UI.
      required: [landlord, cleanliness, amenities, occupants, location, valueForMoney]
      properties:
        landlord:      { type: integer, minimum: 0, maximum: 5 }
        cleanliness:   { type: integer, minimum: 0, maximum: 5 }
        amenities:     { type: integer, minimum: 0, maximum: 5 }
        occupants:     { type: integer, minimum: 0, maximum: 5 }
        location:      { type: integer, minimum: 0, maximum: 5 }
        valueForMoney: { type: integer, minimum: 0, maximum: 5 }

    # Plain calendar date stored as `YYYY-MM-DD`. We deliberately do NOT use
    # OpenAPI's `format: date` here because that maps to `z.date()` (via
    # orval's `useDates: true`), which would coerce values to JS Date objects
    # at the API boundary. The downstream renewal calculator on the frontend
    # splits the raw string on `-` to compute renewal windows, so we keep
    # these as strings and enforce the canonical shape with a regex. This
    # rejects values like `"2026-05-31 00:00:00"` or
    # `"2026-05-31T00:00:00.000Z"` at the API boundary so they cannot reach
    # the database.
    LeaseDate:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2}$'
      example: "2026-05-31"
    # Like LeaseDate, but also permits an empty string. Used for
    # occupant move-in/out dates because the DB column defaults to ""
    # for occupants who were imported without a known move-in date.
    OptionalLeaseDate:
      type: string
      pattern: '^(\d{4}-\d{2}-\d{2})?$'
      example: "2026-05-31"
    Lease:
      type: object
      # The extended fields (clauses, buyoutAvailable, buyoutCost) are
      # intentionally NOT required so older import payloads and pre-extension
      # API clients keep parsing. They are always present in fresh API
      # responses (the DB columns have defaults) but consumers that round-trip
      # them must tolerate their absence on the way IN.
      required: [id, propertyId, startDate, endDate, monthlyRent, securityDeposit, status, notes]
      properties:
        id: { type: string }
        propertyId: { type: string }
        # Term dates are OptionalLeaseDate (allow blank) because the
        # master-lease importer and Ridge Motor Inn seed insert rows
        # awaiting triage with empty `startDate` / `endDate`. Without
        # this, GET /leases 500s as soon as such a row exists. The
        # `deriveLeaseStatus` wrapper falls back to the stored status
        # for blank-date rows. See task #359.
        startDate: { $ref: "#/components/schemas/OptionalLeaseDate" }
        endDate: { $ref: "#/components/schemas/OptionalLeaseDate" }
        monthlyRent: { type: number }
        securityDeposit: { type: number }
        status: { type: string, enum: [Active, Expired, Upcoming] }
        notes: { type: string }
        clauses:
          type: string
          description: "Free-form clause text (additional terms / addenda)."
        buyoutAvailable:
          type: boolean
          description: "Whether the lease has a buyout option."
        buyoutCost:
          type: ["number", "null"]
          description: "Cost of the buyout option, or null when unknown / N/A."
        weeklyCost:
          type: number
          description: |
            Per-week rent (the natural unit in the master file).
            `monthlyRent` is the derived monthly equivalent. Defaults
            to 0 when unknown. Added by task #288.
        vendor:
          type: string
          description: |
            "Housing Vendor for Lease" column from the master file
            (often distinct from the property's landlord). Empty when
            unknown. Added by task #288.
        needsReview:
          type: boolean
          description: |
            True when the source row had ambiguous values (TBD, n/a,
            descriptive cost text) and an operator must triage the
            lease before treating it as Active. Added by task #288.
        rateType:
          type: string
          enum: [monthly, room-night]
          description: |
            Pricing model. `monthly` (default) uses `monthlyRent`.
            `room-night` is a hotel-rate agreement priced per
            occupied night via `nightlyRate` + the room-night minimums
            below. Added by task #299.
        nightlyRate:
          type: number
          description: |
            Per room-night rate in USD. Only meaningful when
            `rateType = room-night`. Added by task #299.
        guaranteedRooms:
          type: integer
          description: |
            Number of rooms the hotel guarantees to keep available.
            Only meaningful when `rateType = room-night`. Added by
            task #299.
        monthlyRoomNightMin:
          type: integer
          description: |
            Minimum revenue-producing room-nights per month — falling
            below this can void the negotiated rate. Only meaningful
            when `rateType = room-night`. Added by task #299.
        longStayTaxExempt:
          type: boolean
          description: |
            True when stays of 30+ days are tax exempt under the
            agreement (Long Stay rule). Added by task #299.
        customerId:
          type: string
          description: |
            Optional override for the tenant on this lease. Leases
            normally inherit the tenant from the property's
            `customerId`; this field is set only for shared-housing
            properties used by multiple customers (e.g. Ridge Motor Inn
            shared by Penda + Trienda KFI crews — task #295) so the
            Leases "By customer" view can show one lease under each
            customer. Empty string means "fall back to property's
            customerId".
        customerResponsibleForRent:
          type: boolean
          description: |
            True when the customer (not the occupant) is on the hook
            for rent, utilities, and damages on this lease — e.g.
            corporate-responsibility units like the KFI-responsible
            Chateau Knoll units called out in the 01/22/2026 LOI.
            Defaults to false. Added by task #313.
        unit:
          type: string
          description: |
            First-class apartment-unit identifier inside a multi-unit
            property (e.g. "509", "500-118", "Apt 3B"). Empty for
            single-unit / whole-house leases. The Property detail
            page groups leases + occupants by this field. Added by
            task #310.
        snoozedUntil:
          $ref: "#/components/schemas/OptionalLeaseDate"
          description: |
            When set to a future YYYY-MM-DD date, the lease is hidden
            from the dashboard "Lease expiry alerts" card until that
            date passes. Empty string means "not snoozed". Persisted
            server-side so the dismissal sticks across reloads and
            across users. Added by task #357.
    LeaseUpdate:
      type: object
      properties:
        propertyId: { type: string }
        startDate: { $ref: "#/components/schemas/LeaseDate" }
        endDate: { $ref: "#/components/schemas/LeaseDate" }
        monthlyRent: { type: number }
        securityDeposit: { type: number }
        status: { type: string, enum: [Active, Expired, Upcoming] }
        notes: { type: string }
        clauses: { type: string }
        buyoutAvailable: { type: boolean }
        buyoutCost:
          type: ["number", "null"]
        weeklyCost: { type: number }
        vendor: { type: string }
        needsReview: { type: boolean }
        rateType: { type: string, enum: [monthly, room-night] }
        nightlyRate: { type: number }
        guaranteedRooms: { type: integer }
        monthlyRoomNightMin: { type: integer }
        longStayTaxExempt: { type: boolean }
        customerId: { type: string }
        customerResponsibleForRent: { type: boolean }
        unit: { type: string }
        snoozedUntil: { $ref: "#/components/schemas/OptionalLeaseDate" }

    RoomNightLog:
      type: object
      required: [id, leaseId, month, roomNights, notes]
      properties:
        id: { type: string }
        leaseId: { type: string }
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
          description: Calendar month the log covers, formatted as YYYY-MM.
        roomNights:
          type: integer
          description: Actual revenue-producing room-nights consumed in `month`.
        notes:
          type: string
          description: Free-form notes (variance vs. minimum, billing reference, etc.).
    RoomNightLogUpdate:
      type: object
      properties:
        leaseId: { type: string }
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
        roomNights: { type: integer }
        notes: { type: string }

    InsuranceCertificate:
      type: object
      # Only `id` and `propertyId` are required so the manual entry path
      # described in the POST endpoint can capture partial certs (e.g.
      # operator knows a cert exists but is still tracking down the
      # ACORD details). Every other field defaults to "" in the DB.
      required: [id, propertyId]
      properties:
        id: { type: string }
        propertyId: { type: string }
        leaseId:
          type: string
          description: |
            Optional: scope the certificate to a specific lease. Empty
            string when the cert covers the property as a whole.
        carrier:
          type: string
          description: |
            Underwriting carrier as printed on the certificate
            (e.g. "Philadelphia Indemnity").
        policyNumber:
          type: string
          description: Policy number from the certificate (ACORD 25 box).
        insuredName:
          type: string
          description: |
            Named insured on the certificate (often the staffing
            company, not the property landlord).
        coverageStart:
          type: string
          description: |
            Coverage start date as YYYY-MM-DD (or empty string when
            unknown / partially captured).
        coverageEnd:
          type: string
          description: Coverage end date as YYYY-MM-DD (or empty string).
        documentUrl:
          type: string
          description: |
            Source PDF / file marker. Free-form so it can hold an
            attached-asset filename today (e.g.
            "Renter_s_Insurance_1778107759430.pdf") and a real
            object-storage URL later.
        notes:
          type: string
    InsuranceCertificateUpdate:
      type: object
      properties:
        propertyId: { type: string }
        leaseId: { type: string }
        carrier: { type: string }
        policyNumber: { type: string }
        insuredName: { type: string }
        coverageStart: { type: string }
        coverageEnd: { type: string }
        documentUrl: { type: string }
        notes: { type: string }

    Room:
      type: object
      required: [id, propertyId, name, sqft, bathrooms, monthlyRent]
      properties:
        id: { type: string }
        propertyId: { type: string }
        name: { type: string }
        sqft: { type: integer }
        bathrooms: { type: number }
        monthlyRent: { type: number }
    RoomUpdate:
      type: object
      properties:
        propertyId: { type: string }
        name: { type: string }
        sqft: { type: integer }
        bathrooms: { type: number }
        monthlyRent: { type: number }

    Bed:
      type: object
      required: [id, propertyId, bedNumber, roomId, status, occupantId]
      properties:
        id: { type: string }
        propertyId: { type: string }
        bedNumber: { type: integer }
        roomId: { type: string }
        status: { type: string, enum: [Occupied, Vacant] }
        occupantId:
          type: ["string", "null"]
    BedUpdate:
      type: object
      properties:
        propertyId: { type: string }
        bedNumber: { type: integer }
        roomId: { type: string }
        status: { type: string, enum: [Occupied, Vacant] }
        occupantId:
          type: ["string", "null"]

    Occupant:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - bedId
        - propertyId
        - moveInDate
        - moveOutDate
        - status
        - chargePerBed
        - billingFrequency
        - employeeId
        - company
        - chargeSource
        - chargeSourceCustomer
        - chargeSourcePersonId
        - shift
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        bedId:
          type: ["string", "null"]
        propertyId:
          type: ["string", "null"]
        moveInDate: { $ref: "#/components/schemas/OptionalLeaseDate" }
        moveOutDate:
          oneOf:
            - $ref: "#/components/schemas/OptionalLeaseDate"
            - type: "null"
        status: { type: string, enum: [Active, Former] }
        chargePerBed: { type: number }
        billingFrequency: { type: string, enum: [Weekly, Biweekly, Monthly] }
        employeeId: { type: string }
        company: { type: string }
        # Provenance of chargePerBed + billingFrequency.
        # "" = manual, no payroll history.
        # "payroll" = set by the housing-deduction seeder.
        # "manual_override" = was set by the seeder, but a human has
        #   since edited charge/frequency. The customer+personId stamps
        #   are KEPT so the UI can show "manually overridden — was
        #   payroll for Acme · 2004810" and accounting can trace the
        #   original link. The seeder skips these rows unless run with
        #   the reclaimOverridden flag.
        chargeSource: { type: string, enum: ["", "payroll", "manual_override"] }
        chargeSourceCustomer: { type: string }
        chargeSourcePersonId: { type: string }
        shift:
          type: ["string", "null"]
          enum: ["1st", "2nd", null]
          description: |
            Crew shift this occupant works. "1st" = 5am–2pm, "2nd" =
            2pm–midnight. Null for properties where shift assignments
            don't apply (most of the portfolio). Surfaced for hot-bedded
            units like 1850 W. Pine St. Baraboo where two shifts share
            the same bedroom (task #315).
        createdAt:
          type: ["string", "null"]
          format: date-time
          description: |
            ISO-8601 timestamp of when this occupant record was created.
            Null for legacy rows inserted before the column existed.
            Used by the dashboard to show how long pending-placement
            occupants have been waiting (task #391).
    # Like `Occupant` but with the chargeSource* provenance fields
    # optional — newly-created occupants are assumed to be manually
    # entered, and the seeder is the only writer that stamps these.
    OccupantCreate:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - bedId
        - propertyId
        - moveInDate
        - moveOutDate
        - status
        - chargePerBed
        - billingFrequency
        - employeeId
        - company
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        bedId:
          type: ["string", "null"]
        propertyId:
          type: ["string", "null"]
        moveInDate: { $ref: "#/components/schemas/OptionalLeaseDate" }
        moveOutDate:
          oneOf:
            - $ref: "#/components/schemas/OptionalLeaseDate"
            - type: "null"
        status: { type: string, enum: [Active, Former] }
        chargePerBed: { type: number }
        billingFrequency: { type: string, enum: [Weekly, Biweekly, Monthly] }
        employeeId: { type: string }
        company: { type: string }
        chargeSource: { type: string, enum: ["", "payroll", "manual_override"] }
        chargeSourceCustomer: { type: string }
        chargeSourcePersonId: { type: string }
        shift:
          type: ["string", "null"]
          enum: ["1st", "2nd", null]
    OccupantUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        bedId:
          type: ["string", "null"]
        propertyId:
          type: ["string", "null"]
        moveInDate: { $ref: "#/components/schemas/OptionalLeaseDate" }
        moveOutDate:
          oneOf:
            - $ref: "#/components/schemas/OptionalLeaseDate"
            - type: "null"
        status: { type: string, enum: [Active, Former] }
        chargePerBed: { type: number }
        billingFrequency: { type: string, enum: [Weekly, Biweekly, Monthly] }
        employeeId: { type: string }
        company: { type: string }
        chargeSource: { type: string, enum: ["", "payroll", "manual_override"] }
        chargeSourceCustomer: { type: string }
        chargeSourcePersonId: { type: string }
        shift:
          type: ["string", "null"]
          enum: ["1st", "2nd", null]

    Utility:
      type: object
      required: [id, propertyId, type, company, monthlyCost, accountNumber, notes]
      properties:
        id: { type: string }
        propertyId: { type: string }
        type:
          type: string
          enum: [Electric, Gas, Propane, Water, Garbage, Internet, Other]
        company: { type: string }
        monthlyCost: { type: number }
        accountNumber: { type: string }
        notes: { type: string }
    UtilityUpdate:
      type: object
      properties:
        propertyId: { type: string }
        type:
          type: string
          enum: [Electric, Gas, Propane, Water, Garbage, Internet, Other]
        company: { type: string }
        monthlyCost: { type: number }
        accountNumber: { type: string }
        notes: { type: string }

    LeasePdfExtracted:
      type: object
      required:
        - propertyName
        - propertyAddress
        - city
        - state
        - zip
        - landlordName
        - startDate
        - endDate
        - monthlyRent
        - securityDeposit
        - notes
        - clauses
        - buyoutAvailable
        - buyoutCost
        - confidence
      description: |
        Lease fields parsed from the uploaded PDF. Any field the LLM could not
        identify with reasonable certainty is returned as `null` (or `""` /
        `false` for the non-nullable string / boolean fields) so the user can
        fill it in during the review step.
      properties:
        propertyName: { type: string, nullable: true }
        propertyAddress: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        zip: { type: string, nullable: true }
        landlordName: { type: string, nullable: true }
        startDate:
          oneOf:
            - $ref: "#/components/schemas/OptionalLeaseDate"
            - type: "null"
        endDate:
          oneOf:
            - $ref: "#/components/schemas/OptionalLeaseDate"
            - type: "null"
        monthlyRent: { type: number, nullable: true }
        securityDeposit: { type: number, nullable: true }
        notes: { type: string }
        clauses:
          type: string
          description: Free-form summary of notable lease clauses (pet policy, late fees, etc.). Empty when none.
        buyoutAvailable:
          type: boolean
          description: True only when the lease explicitly grants an early-termination buyout option.
        buyoutCost:
          type: number
          nullable: true
          description: Flat USD buyout fee when stated, else null. Always null when `buyoutAvailable` is false.
        confidence:
          type: string
          enum: [high, medium, low]

    LeasePdfPropertyCandidate:
      type: object
      required: [propertyId, propertyName, address, city, state, customerName, score]
      properties:
        propertyId: { type: string }
        propertyName: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        customerName: { type: string }
        score:
          type: number
          description: 0..1 match score, higher is better.

    LeasePdfFixup:
      type: object
      required: [field, before, after]
      properties:
        field: { type: string }
        before: { type: string }
        after: { type: string }

    LeasePdfImportResult:
      type: object
      required: [extracted, topMatch, candidates, fixups]
      properties:
        extracted: { $ref: "#/components/schemas/LeasePdfExtracted" }
        fixups:
          type: array
          description: Coercions the normaliser applied to the extracted lease values.
          items: { $ref: "#/components/schemas/LeasePdfFixup" }
        topMatch:
          allOf: [{ $ref: "#/components/schemas/LeasePdfPropertyCandidate" }]
          nullable: true
          description: Best candidate when its score is comfortably above the noise floor; otherwise `null`.
        candidates:
          type: array
          maxItems: 5
          description: Top candidates sorted by score desc; may be empty.
          items: { $ref: "#/components/schemas/LeasePdfPropertyCandidate" }

    MasterLeaseImportRowFixup:
      type: object
      required: [field, before, after]
      properties:
        field: { type: string }
        before: { type: string }
        after: { type: string }

    MasterLeaseImportRowDecision:
      type: object
      required:
        - sourceRow
        - customerName
        - customerAction
        - customerId
        - propertyAction
        - leaseAction
        - needsReview
        - reviewReasons
        - fixups
      properties:
        sourceRow: { type: integer }
        customerName: { type: string }
        customerAction: { type: string, enum: [created, updated, matched] }
        customerId: { type: string }
        customerMatchReason: { type: string }
        propertyAction: { type: string, enum: [created, updated, matched, skipped] }
        propertyId: { type: string }
        propertyMatchReason: { type: string }
        leaseAction: { type: string, enum: [created, updated, skipped] }
        leaseId: { type: string }
        needsReview: { type: boolean }
        reviewReasons:
          type: array
          items: { type: string }
        fixups:
          type: array
          items: { $ref: "#/components/schemas/MasterLeaseImportRowFixup" }

    MasterLeaseImportResult:
      type: object
      required:
        - customersCreated
        - customersUpdated
        - propertiesCreated
        - propertiesUpdated
        - leasesCreated
        - leasesUpdated
        - leasesSkipped
        - rowsNeedingReview
        - fuzzyCustomerMatches
        - decisions
        - rowsWithFixups
        - bundledFilename
        - bundledMtime
      properties:
        customersCreated: { type: integer }
        customersUpdated: { type: integer }
        propertiesCreated: { type: integer }
        propertiesUpdated: { type: integer }
        leasesCreated: { type: integer }
        leasesUpdated: { type: integer }
        leasesSkipped: { type: integer }
        bundledFilename:
          type: ["string", "null"]
          description: |
            Filename of the bundled master workbook that was used for
            this import (Task #392). `null` when the operator uploaded
            their own file instead of using the bundled one.
        bundledMtime:
          type: ["string", "null"]
          format: date-time
          description: |
            ISO-8601 modification time of the bundled master workbook
            that was used for this import (Task #392). `null` when the
            operator uploaded their own file.
        rowsNeedingReview:
          type: array
          items: { $ref: "#/components/schemas/MasterLeaseImportRowDecision" }
        fuzzyCustomerMatches:
          type: array
          items:
            type: object
            required: [incoming, matchedExisting, distance]
            properties:
              incoming: { type: string }
              matchedExisting: { type: string }
              distance: { type: integer }
        decisions:
          type: array
          items: { $ref: "#/components/schemas/MasterLeaseImportRowDecision" }
        rowsWithFixups:
          type: array
          description: Subset of decisions whose row had at least one normaliser fix-up applied.
          items: { $ref: "#/components/schemas/MasterLeaseImportRowDecision" }

    LastAutoMasterImport:
      type: object
      required: [ranAt, bundledMtime, bundledFilename]
      description: |
        Timestamp + summary counts of the most recent successful
        boot-time master-file auto-import (Task #318). When the boot
        import has never succeeded in this process, `ranAt` is `null`
        and the count fields are omitted.
      properties:
        ranAt:
          type: ["string", "null"]
          format: date-time
          description: |
            ISO-8601 timestamp of the most recent successful boot
            import, or `null` when no boot import has succeeded yet.
        bundledFilename:
          type: ["string", "null"]
          description: |
            Filename of the bundled `Housing_Lease_MASTER_*.xlsx`
            workbook under `attached_assets/` (Task #392). `null`
            when the bundled file cannot be read on disk.
        bundledMtime:
          type: ["string", "null"]
          format: date-time
          description: |
            ISO-8601 modification time of the bundled
            `Housing_Lease_MASTER_*.xlsx` workbook under
            `attached_assets/` (Task #340). The Leases-page indicator
            compares this against `ranAt` to detect a stale boot
            import — a workbook that was dropped after the last
            successful auto-import. `null` when the bundled file
            cannot be read on disk.
        customersCreated: { type: integer }
        customersUpdated: { type: integer }
        propertiesCreated: { type: integer }
        propertiesUpdated: { type: integer }
        leasesCreated: { type: integer }
        leasesUpdated: { type: integer }
        leasesSkipped: { type: integer }

    UnplacedPayrollRow:
      type: object
      required: [customer, name, personId, weekly, suggestions]
      description: |
        A payroll row that should be deducting weekly housing rent for an
        employee, but doesn't match any occupant in HousingOps yet.
        Returned by `GET /payroll/unplaced`.
      properties:
        customer:
          type: string
          description: Customer / employer name as it appears in the payroll export.
        name:
          type: string
          description: Employee full name as it appears in the payroll export.
        personId:
          type: string
          description: Payroll Person Id (employeeId) for the employee.
        weekly:
          type: number
          description: Recurring weekly deduction amount (USD).
        suggestions:
          type: array
          description: |
            Up to 3 likely existing occupants whose name closely
            resembles the payroll row's name (typo / initial /
            formatting differences). Sorted by descending similarity.
            Same-employer candidates are preferred; if none clear the
            threshold the seeder falls back to cross-employer
            candidates flagged with `crossEmployer = true` so the
            dashboard can warn the operator that confirming will also
            change the occupant's employer. Empty when nothing scores
            ≥ 0.6 in either pass.
          items: { $ref: "#/components/schemas/UnplacedPayrollSuggestion" }

    ListUnplacedPayrollResult:
      type: object
      required: [unmatched, lowConfidenceMatches]
      description: |
        Response payload for `GET /payroll/unplaced`. Splits the
        seeder's output into rows that need a fresh placement
        (`unmatched`) vs. rows that matched only via the name-only
        fallback (`lowConfidenceMatches`) and may need an operator
        confirmation that the right person was picked.
      properties:
        unmatched:
          type: array
          items: { $ref: "#/components/schemas/UnplacedPayrollRow" }
        lowConfidenceMatches:
          type: array
          items: { $ref: "#/components/schemas/LowConfidencePayrollMatch" }

    LowConfidencePayrollMatch:
      type: object
      required: [customer, name, personId, weekly, matched, suggestions]
      description: |
        A payroll row that the seeder *did* apply, but only via the
        name-only fallback — meaning the matched occupant has no
        employeeId stamped and no exact (name, company) hit. At an
        employer with two namesakes the wrong one may have received
        the rate, so the dashboard asks the operator to confirm.
      properties:
        customer:
          type: string
          description: Customer / employer name from the payroll export.
        name:
          type: string
          description: Employee full name from the payroll export.
        personId:
          type: string
          description: Payroll Person Id (employeeId) for the employee.
        weekly:
          type: number
          description: Recurring weekly deduction amount (USD) the seeder applied.
        matched:
          $ref: "#/components/schemas/UnplacedPayrollSuggestion"
          description: |
            The occupant the seeder picked via the name-only fallback.
            Re-uses the suggestion shape so the UI can render it the
            same way as alternatives (name, propertyName, score=1).
        suggestions:
          type: array
          description: |
            Alternative same-employer candidates (excluding the
            already-matched occupant). Empty when no other plausible
            namesake exists at that employer — the operator can still
            confirm the matched occupant or open the assign-to-bed
            dialog manually.
          items: { $ref: "#/components/schemas/UnplacedPayrollSuggestion" }

    UnplacedPayrollSuggestion:
      type: object
      required: [occupantId, name, company, propertyName, score, crossEmployer]
      description: |
        A close-but-not-exact existing-occupant candidate for an
        unplaced payroll row. The dashboard renders these as
        "Did you mean: <name> @ <propertyName>?" buttons that update
        the existing occupant's chargePerBed/billingFrequency from the
        payroll row instead of creating a duplicate.
      properties:
        occupantId:
          type: string
          description: Id of the existing occupant the suggestion points at.
        name:
          type: string
          description: Existing occupant's name as stored in HousingOps.
        company:
          type: string
          description: |
            Existing occupant's employer as stored in HousingOps.
            Surfaced so the dashboard can show the cross-employer
            warning ("… — Penda Corp?") without an extra lookup.
        propertyName:
          type: ["string", "null"]
          description: |
            Property the candidate is currently assigned to, or null
            when the occupant isn't assigned to a property yet.
        score:
          type: number
          description: Name similarity in [0, 1]. Higher is closer.
        crossEmployer:
          type: boolean
          description: |
            True when this candidate's employer differs from the
            payroll row's customer. Only set on the cross-employer
            fallback pass; the dashboard uses this to render a
            distinct "Did you mean (different employer): …" label and
            to also overwrite the occupant's company on confirm.

    DigestRecipient:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time

    DigestRecipientCreate:
      type: object
      required: [email]
      properties:
        email:
          type: string
          description: Email address to subscribe to the weekly digest.

    ImportPayload:
      type: object
      required: [customers, properties, leases, rooms, beds, occupants, utilities]
      properties:
        customers:
          type: array
          items: { $ref: "#/components/schemas/Customer" }
        properties:
          type: array
          items: { $ref: "#/components/schemas/Property" }
        leases:
          type: array
          items: { $ref: "#/components/schemas/Lease" }
        rooms:
          type: array
          items: { $ref: "#/components/schemas/Room" }
        beds:
          type: array
          items: { $ref: "#/components/schemas/Bed" }
        occupants:
          # Use OccupantCreate so legacy export bundles (which predate
          # the chargeSource* provenance fields added in Task #304)
          # keep round-tripping through POST /import.
          type: array
          items: { $ref: "#/components/schemas/OccupantCreate" }
        utilities:
          type: array
          items: { $ref: "#/components/schemas/Utility" }
        roomNightLogs:
          type: array
          description: |
            Optional. Room-night log entries against hotel-rate leases.
            Older backups (pre task #299) won't include this — the
            importer treats a missing array as empty.
          items: { $ref: "#/components/schemas/RoomNightLog" }
        insuranceCertificates:
          type: array
          description: |
            Optional. Renter's / liability insurance certificates on
            file for properties. Older backups (pre task #333) won't
            include this — the importer treats a missing array as
            empty.
          items: { $ref: "#/components/schemas/InsuranceCertificate" }
